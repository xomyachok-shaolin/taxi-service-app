<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Управление пользователями — Служба Такси')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container flex-grow-1 py-4">
    <h2 class="mb-4"><i class="bi bi-people-fill text-warning me-2"></i>Управление пользователями</h2>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i><span th:text="${success}">Успех</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}">Ошибка</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="table-responsive">
        <table class="table table-hover table-striped align-middle">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Логин</th>
                <th>ФИО</th>
                <th>Телефон</th>
                <th>Email</th>
                <th>Роль</th>
                <th>Активен</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user, iter : ${users}">
                <td th:text="${iter.index + 1}">1</td>
                <td th:text="${user.username}">admin</td>
                <td th:text="${user.fullName}">Иванов Иван</td>
                <td th:text="${user.phone}">+7 (999) 000-00-00</td>
                <td>
                    <span th:if="${user.email != null and !user.email.isEmpty()}" th:text="${user.email}">mail@example.ru</span>
                    <span th:if="${user.email == null or user.email.isEmpty()}" class="text-muted">&mdash;</span>
                </td>
                <td>
                    <!-- Role Change Form -->
                    <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post" class="d-inline">
                        <select name="role" class="form-select form-select-sm d-inline-block" style="width: auto;"
                                onchange="this.form.submit();">
                            <option value="CLIENT" th:selected="${user.role.name() == 'CLIENT'}">Клиент</option>
                            <option value="DRIVER" th:selected="${user.role.name() == 'DRIVER'}">Водитель</option>
                            <option value="DISPATCHER" th:selected="${user.role.name() == 'DISPATCHER'}">Диспетчер</option>
                            <option value="ADMIN" th:selected="${user.role.name() == 'ADMIN'}">Администратор</option>
                        </select>
                    </form>
                </td>
                <td>
                    <span th:if="${user.enabled}" class="badge bg-success">Да</span>
                    <span th:unless="${user.enabled}" class="badge bg-danger">Нет</span>
                </td>
                <td>
                    <!-- Toggle Enable/Disable -->
                    <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm"
                                th:classappend="${user.enabled} ? 'btn-outline-danger' : 'btn-outline-success'"
                                th:title="${user.enabled} ? 'Заблокировать' : 'Разблокировать'">
                            <i class="bi" th:classappend="${user.enabled} ? 'bi-lock' : 'bi-unlock'"></i>
                            <span th:text="${user.enabled} ? 'Блокировать' : 'Разблокировать'">Действие</span>
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="8" class="text-center text-muted py-4">
                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>Пользователи не найдены
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

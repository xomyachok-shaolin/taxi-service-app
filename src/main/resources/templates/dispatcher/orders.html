<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Управление заказами — Служба Такси')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container-fluid flex-grow-1 py-4 px-4">
    <h2 class="mb-4"><i class="bi bi-list-ul text-warning me-2"></i>Управление заказами</h2>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i><span th:text="${success}">Успех</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}">Ошибка</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filters -->
    <div class="card border-warning mb-4">
        <div class="card-body py-2">
            <form th:action="@{/dispatcher/orders}" method="get" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small mb-1">Фильтр по статусу</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="">Все статусы</option>
                        <option value="CREATED" th:selected="${statusFilter == 'CREATED'}">Новый</option>
                        <option value="ASSIGNED" th:selected="${statusFilter == 'ASSIGNED'}">Назначен</option>
                        <option value="EN_ROUTE" th:selected="${statusFilter == 'EN_ROUTE'}">В пути к клиенту</option>
                        <option value="IN_PROGRESS" th:selected="${statusFilter == 'IN_PROGRESS'}">Выполняется</option>
                        <option value="COMPLETED" th:selected="${statusFilter == 'COMPLETED'}">Завершён</option>
                        <option value="CANCELLED" th:selected="${statusFilter == 'CANCELLED'}">Отменён</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label small mb-1">Поиск по адресу</label>
                    <input type="text" name="search" th:value="${search}"
                           class="form-control form-control-sm" placeholder="Введите адрес..."/>
                </div>
                <div class="col-md-3">
                    <label class="form-label small mb-1">Сортировка</label>
                    <select name="sort" class="form-select form-select-sm">
                        <option value="date" th:selected="${sort == 'date'}">По дате</option>
                        <option value="price" th:selected="${sort == 'price'}">По цене</option>
                        <option value="distance" th:selected="${sort == 'distance'}">По расстоянию</option>
                        <option value="status" th:selected="${sort == 'status'}">По статусу</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-dark btn-sm w-100">
                        <i class="bi bi-funnel me-1"></i>Применить
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Orders Table -->
    <div class="table-responsive">
        <table class="table table-hover table-striped align-middle table-sm">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Дата</th>
                <th>Клиент</th>
                <th>Откуда</th>
                <th>Куда</th>
                <th>Водитель</th>
                <th>Статус</th>
                <th>Расстояние</th>
                <th>Цена</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order, iter : ${orders}">
                <td th:text="${iter.index + 1}">1</td>
                <td th:text="${#temporals.format(order.orderTime, 'dd.MM.yyyy HH:mm')}">01.01.2026</td>
                <td>
                    <span th:if="${order.client != null}" th:text="${order.client.fullName}">Клиент</span>
                    <span th:if="${order.client == null}" class="text-muted">&mdash;</span>
                </td>
                <td th:text="${order.pickupAddress}">Адрес</td>
                <td th:text="${order.destinationAddress}">Адрес</td>
                <td>
                    <span th:if="${order.driver != null}" th:text="${order.driver.user.fullName}">Водитель</span>
                    <span th:if="${order.driver == null}" class="text-muted">Не назначен</span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${order.status.name() == 'CREATED'} ? 'bg-primary' :
                                          (${order.status.name() == 'ASSIGNED'} ? 'bg-info text-dark' :
                                          (${order.status.name() == 'EN_ROUTE'} ? 'bg-warning text-dark' :
                                          (${order.status.name() == 'IN_PROGRESS'} ? 'bg-orange' :
                                          (${order.status.name() == 'COMPLETED'} ? 'bg-success' :
                                          (${order.status.name() == 'CANCELLED'} ? 'bg-danger' : 'bg-secondary')))))"
                          th:text="${order.status.name() == 'CREATED'} ? 'Новый' :
                                   (${order.status.name() == 'ASSIGNED'} ? 'Назначен' :
                                   (${order.status.name() == 'EN_ROUTE'} ? 'В пути' :
                                   (${order.status.name() == 'IN_PROGRESS'} ? 'Выполняется' :
                                   (${order.status.name() == 'COMPLETED'} ? 'Завершён' :
                                   (${order.status.name() == 'CANCELLED'} ? 'Отменён' : order.status)))))">
                        Статус
                    </span>
                </td>
                <td>
                    <span th:if="${order.distance != null}" th:text="${#numbers.formatDecimal(order.distance, 1, 1)} + ' км'">0 км</span>
                    <span th:if="${order.distance == null}" class="text-muted">&mdash;</span>
                </td>
                <td>
                    <span th:if="${order.price != null}" th:text="${#numbers.formatDecimal(order.price, 1, 2)} + ' ₽'" class="fw-bold">0 ₽</span>
                    <span th:if="${order.price == null}" class="text-muted">&mdash;</span>
                </td>
                <td>
                    <!-- Assign Driver (for NEW orders) -->
                    <div th:if="${order.status.name() == 'CREATED'}" class="d-inline">
                        <button type="button" class="btn btn-sm btn-warning text-dark"
                                data-bs-toggle="modal"
                                th:data-bs-target="'#assignModal' + ${order.id}"
                                title="Назначить водителя">
                            <i class="bi bi-person-plus"></i>
                        </button>
                    </div>

                    <!-- Cancel -->
                    <form th:if="${order.status.name() != 'COMPLETED' and order.status.name() != 'CANCELLED'}"
                          th:action="@{/dispatcher/orders/{id}/cancel(id=${order.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                onclick="return confirm('Отменить заказ?');" title="Отменить">
                            <i class="bi bi-x-circle"></i>
                        </button>
                    </form>

                    <!-- Edit -->
                    <a th:href="@{/dispatcher/orders/{id}/edit(id=${order.id})}"
                       class="btn btn-sm btn-outline-dark" title="Редактировать">
                        <i class="bi bi-pencil"></i>
                    </a>

                    <!-- Delete -->
                    <form th:action="@{/dispatcher/orders/{id}/delete(id=${order.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                onclick="return confirm('Удалить заказ навсегда?');" title="Удалить">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(orders)}">
                <td colspan="10" class="text-center text-muted py-4">
                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>Заказы не найдены
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Assign Driver Modals -->
<div th:each="order : ${orders}" th:if="${order.status.name() == 'CREATED'}">
    <div class="modal fade" th:id="'assignModal' + ${order.id}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-warning">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title">
                        Назначить водителя на заказ #<span th:text="${order.id}">1</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/dispatcher/orders/{id}/assign(id=${order.id})}" method="post">
                    <div class="modal-body">
                        <p>
                            <strong>Маршрут:</strong>
                            <span th:text="${order.pickupAddress}">Откуда</span> &rarr;
                            <span th:text="${order.destinationAddress}">Куда</span>
                        </p>
                        <div class="mb-3">
                            <label class="form-label">Выберите водителя</label>
                            <select name="driverId" class="form-select" required>
                                <option value="">-- Выберите --</option>
                                <option th:each="driver : ${availableDrivers}"
                                        th:value="${driver.id}"
                                        th:text="${driver.user.fullName + ' (рейтинг: ' + driver.rating + ')'}">
                                    Водитель
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-warning text-dark fw-bold">
                            <i class="bi bi-check-circle me-1"></i>Назначить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Клиенты — Служба Такси')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container flex-grow-1 py-4">
    <h2 class="mb-4"><i class="bi bi-person-lines-fill text-warning me-2"></i>Список клиентов</h2>

    <div class="table-responsive">
        <table class="table table-hover table-striped align-middle">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>ФИО</th>
                <th>Телефон</th>
                <th>Email</th>
                <th>Кол-во заказов</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="client, iter : ${clients}">
                <td th:text="${iter.index + 1}">1</td>
                <td th:text="${client.fullName}">Иванов Иван</td>
                <td th:text="${client.phone}">+7 (999) 000-00-00</td>
                <td>
                    <span th:if="${client.email != null and !client.email.isEmpty()}" th:text="${client.email}">mail@example.ru</span>
                    <span th:if="${client.email == null or client.email.isEmpty()}" class="text-muted">&mdash;</span>
                </td>
                <td>
                    <span class="badge bg-warning text-dark" th:text="${client.orders.size()}">0</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(clients)}">
                <td colspan="5" class="text-center text-muted py-4">
                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>Клиенты не найдены
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

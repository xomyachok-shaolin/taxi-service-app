<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ==================== HEAD ==================== -->
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title}">Служба Такси</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>

<!-- ==================== NAVBAR ==================== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-taxi-front-fill text-warning me-2"></i>Служба Такси
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto">

                <!-- CLIENT -->
                <li class="nav-item" sec:authorize="hasRole('CLIENT')">
                    <a class="nav-link" th:href="@{/client/orders}">
                        <i class="bi bi-list-ul me-1"></i>Мои заказы
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('CLIENT')">
                    <a class="nav-link" th:href="@{/client/orders/new}">
                        <i class="bi bi-plus-circle me-1"></i>Новый заказ
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('CLIENT')">
                    <a class="nav-link" th:href="@{/client/profile}">
                        <i class="bi bi-person me-1"></i>Профиль
                    </a>
                </li>

                <!-- DRIVER -->
                <li class="nav-item" sec:authorize="hasRole('DRIVER')">
                    <a class="nav-link" th:href="@{/driver/orders}">
                        <i class="bi bi-list-ul me-1"></i>Заказы
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('DRIVER')">
                    <a class="nav-link" th:href="@{/driver/profile}">
                        <i class="bi bi-person me-1"></i>Профиль
                    </a>
                </li>

                <!-- DISPATCHER -->
                <li class="nav-item" sec:authorize="hasRole('DISPATCHER')">
                    <a class="nav-link" th:href="@{/dispatcher/orders}">
                        <i class="bi bi-list-ul me-1"></i>Заказы
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('DISPATCHER')">
                    <a class="nav-link" th:href="@{/dispatcher/drivers}">
                        <i class="bi bi-people me-1"></i>Водители
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('DISPATCHER')">
                    <a class="nav-link" th:href="@{/dispatcher/clients}">
                        <i class="bi bi-person-lines-fill me-1"></i>Клиенты
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('DISPATCHER')">
                    <a class="nav-link" th:href="@{/dispatcher/statistics}">
                        <i class="bi bi-bar-chart me-1"></i>Статистика
                    </a>
                </li>

                <!-- ADMIN -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}">
                        <i class="bi bi-people-fill me-1"></i>Пользователи
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/statistics}">
                        <i class="bi bi-bar-chart me-1"></i>Статистика
                    </a>
                </li>

                <!-- COMMON -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/about}">
                        <i class="bi bi-info-circle me-1"></i>Об авторе
                    </a>
                </li>
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-warning">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">user</span>
                    </span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-warning btn-sm nav-link">
                            <i class="bi bi-box-arrow-right me-1"></i>Выйти
                        </button>
                    </form>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/login}">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Войти
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ==================== FOOTER ==================== -->
<footer th:fragment="footer" class="footer bg-dark text-light py-3 mt-auto">
    <div class="container text-center">
        <span class="text-warning">&copy; 2026 Служба Такси</span>
    </div>
</footer>

<!-- ==================== SCRIPTS ==================== -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</div>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Ошибка — Служба Такси')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="text-center">
        <div class="display-1 fw-bold text-warning">
            <i class="bi bi-exclamation-triangle"></i>
        </div>
        <h2 class="mb-3">Произошла ошибка</h2>
        <p class="text-muted mb-2" th:if="${status}">
            Код ошибки: <span class="fw-bold" th:text="${status}">---</span>
        </p>
        <p class="text-muted mb-4" th:if="${message}">
            <span th:text="${message}">Неизвестная ошибка</span>
        </p>
        <p class="text-muted mb-4" th:unless="${message}">
            Что-то пошло не так. Попробуйте повторить действие или вернитесь на главную страницу.
        </p>
        <a th:href="@{/}" class="btn btn-warning fw-bold text-dark">
            <i class="bi bi-house me-1"></i>На главную
        </a>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Новый заказ — Служба Такси')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container flex-grow-1 py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="card shadow-lg border-warning">
                <div class="card-header bg-warning text-dark">
                    <h3 class="mb-0"><i class="bi bi-plus-circle-fill me-2"></i>Новый заказ</h3>
                </div>
                <div class="card-body p-4">

                    <div th:if="${error}" class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        <span th:text="${error}">Ошибка</span>
                    </div>

                    <form th:action="@{/client/orders}" th:object="${order}" method="post" novalidate>
                        <div class="mb-3">
                            <label for="pickupAddress" class="form-label">
                                Адрес отправления <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-warning text-dark"><i class="bi bi-geo-alt"></i></span>
                                <input type="text" id="pickupAddress" th:field="*{pickupAddress}"
                                       class="form-control" placeholder="Откуда вас забрать?" required/>
                            </div>
                            <div th:if="${#fields.hasErrors('pickupAddress')}" class="text-danger small mt-1"
                                 th:errors="*{pickupAddress}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="destinationAddress" class="form-label">
                                Адрес назначения <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-warning text-dark"><i class="bi bi-geo-alt-fill"></i></span>
                                <input type="text" id="destinationAddress" th:field="*{destinationAddress}"
                                       class="form-control" placeholder="Куда вам нужно?" required/>
                            </div>
                            <div th:if="${#fields.hasErrors('destinationAddress')}" class="text-danger small mt-1"
                                 th:errors="*{destinationAddress}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="comment" class="form-label">Комментарий</label>
                            <textarea id="comment" th:field="*{comment}"
                                      class="form-control" rows="3"
                                      placeholder="Дополнительные пожелания (необязательно)"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning fw-bold text-dark flex-grow-1">
                                <i class="bi bi-check-circle me-1"></i>Создать заказ
                            </button>
                            <a th:href="@{/client/orders}" class="btn btn-outline-dark">
                                <i class="bi bi-arrow-left me-1"></i>Назад
                            </a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

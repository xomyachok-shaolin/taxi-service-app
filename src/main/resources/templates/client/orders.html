<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Мои заказы — Служба Такси')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container flex-grow-1 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0"><i class="bi bi-list-ul text-warning me-2"></i>Мои заказы</h2>
        <a th:href="@{/client/orders/new}" class="btn btn-warning fw-bold text-dark">
            <i class="bi bi-plus-circle me-1"></i>Новый заказ
        </a>
    </div>

    <!-- Filters -->
    <div class="card border-warning mb-4">
        <div class="card-body py-2">
            <form th:action="@{/client/orders}" method="get" class="row g-2 align-items-end">
                <div class="col-md-6">
                    <label class="form-label small mb-1">Поиск по адресу</label>
                    <input type="text" name="search" th:value="${search}"
                           class="form-control form-control-sm" placeholder="Введите адрес..."/>
                </div>
                <div class="col-md-4">
                    <label class="form-label small mb-1">Сортировка</label>
                    <select name="sort" class="form-select form-select-sm">
                        <option value="date" th:selected="${sort == 'date'}">По дате</option>
                        <option value="price" th:selected="${sort == 'price'}">По цене</option>
                        <option value="distance" th:selected="${sort == 'distance'}">По расстоянию</option>
                        <option value="status" th:selected="${sort == 'status'}">По статусу</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-dark btn-sm w-100">
                        <i class="bi bi-search me-1"></i>Найти
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Orders Table -->
    <div class="table-responsive">
        <table class="table table-hover table-striped align-middle">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Дата</th>
                <th>Откуда</th>
                <th>Куда</th>
                <th>Статус</th>
                <th>Расстояние</th>
                <th>Цена</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order, iter : ${orders}">
                <td th:text="${iter.index + 1}">1</td>
                <td th:text="${#temporals.format(order.orderTime, 'dd.MM.yyyy HH:mm')}">01.01.2026</td>
                <td th:text="${order.pickupAddress}">Адрес отправления</td>
                <td th:text="${order.destinationAddress}">Адрес назначения</td>
                <td>
                    <span class="badge"
                          th:classappend="${order.status.name() == 'CREATED'} ? 'bg-primary' :
                                          (${order.status.name() == 'ASSIGNED'} ? 'bg-info text-dark' :
                                          (${order.status.name() == 'EN_ROUTE'} ? 'bg-warning text-dark' :
                                          (${order.status.name() == 'IN_PROGRESS'} ? 'bg-orange' :
                                          (${order.status.name() == 'COMPLETED'} ? 'bg-success' :
                                          (${order.status.name() == 'CANCELLED'} ? 'bg-danger' : 'bg-secondary')))))"
                          th:text="${order.status.name() == 'CREATED'} ? 'Новый' :
                                   (${order.status.name() == 'ASSIGNED'} ? 'Назначен' :
                                   (${order.status.name() == 'EN_ROUTE'} ? 'В пути к клиенту' :
                                   (${order.status.name() == 'IN_PROGRESS'} ? 'Выполняется' :
                                   (${order.status.name() == 'COMPLETED'} ? 'Завершён' :
                                   (${order.status.name() == 'CANCELLED'} ? 'Отменён' : order.status)))))">
                        Статус
                    </span>
                </td>
                <td>
                    <span th:if="${order.distance != null}" th:text="${#numbers.formatDecimal(order.distance, 1, 1)} + ' км'">0 км</span>
                    <span th:if="${order.distance == null}" class="text-muted">&mdash;</span>
                </td>
                <td>
                    <span th:if="${order.price != null}" th:text="${#numbers.formatDecimal(order.price, 1, 2)} + ' ₽'" class="fw-bold text-dark">0 ₽</span>
                    <span th:if="${order.price == null}" class="text-muted">&mdash;</span>
                </td>
                <td>
                    <a th:href="@{/client/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-dark">
                        <i class="bi bi-eye"></i>
                    </a>
                    <a th:if="${order.status.name() == 'CREATED'}"
                       th:href="@{/client/orders/{id}/cancel(id=${order.id})}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Отменить заказ?');">
                        <i class="bi bi-x-circle"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(orders)}">
                <td colspan="8" class="text-center text-muted py-4">
                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>Заказов пока нет
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>

# ===========================================
# Информационно-справочная система службы такси
# ===========================================

# Профиль по умолчанию - H2 (для разработки)
# Для PostgreSQL используйте: spring.profiles.active=postgres

spring.application.name=taxi-service

# H2 Database (профиль по умолчанию для разработки)
spring.datasource.url=jdbc:h2:file:./data/taxidb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Server
server.port=8080
server.error.whitelabel.enabled=false

# Logging
logging.level.com.taxiservice=INFO
logging.level.org.springframework.security=WARN
